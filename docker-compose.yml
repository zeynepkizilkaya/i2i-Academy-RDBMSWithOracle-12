services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: bookuser
      APP_USER_PASSWORD: bookpass
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rdbms-with-oracle-app
    depends_on:
      oracle-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      DB_USERNAME: bookuser
      DB_PASSWORD: bookpass

volumes:
  oracle-data:
